            const allDevs = getAllDevicesList();
            const device = allDevs.find(d => d.id === deviceId);
            if (!device) return;

            for (const room in allDevices) {
                const idx = allDevices[room].findIndex(d => d.id === deviceId);
                if (idx !== -1) {
                    allDevices[room][idx].light = isOn;
                    addLog(`💨 ${device.name} 照明 ${isOn ? '已开启' : '已关闭'}`);
                    sendToBackend(deviceId, 'set_light', isOn ? 1 : 0);
                    saveToStorage();
                    break;
                }
            }
            renderUI();
            renderScene();
            if (document.getElementById('modalOverlay').classList.contains('show')) {
                openModal(deviceId);
            }
        }

        function controlHoodAndSend(deviceId, action) {
            const allDevs = getAllDevicesList();
            const device = allDevs.find(d => d.id === deviceId);
            if (!device) return;

            for (const room in allDevices) {
                const idx = allDevices[room].findIndex(d => d.id === deviceId);
                if (idx !== -1) {
                    if (action === 'on') {
                        allDevices[room][idx].power = 'on';
                        if (allDevices[room][idx].fanSpeed === 0) {
                            allDevices[room][idx].fanSpeed = 2;
                        }
                        addLog(`💨 ${device.name} 已开启`);
                        sendToBackend(deviceId, 'switch', 1);
                    } else if (action === 'off') {
                        allDevices[room][idx].power = 'off';
                        allDevices[room][idx].fanSpeed = 0;
                        allDevices[room][idx].light = false;
                        addLog(`💨 ${device.name} 已关闭`);
                        sendToBackend(deviceId, 'switch', 0);
                    }
                    saveToStorage();
                    break;
                }
            }

            renderUI();
            renderScene();
            if (document.getElementById('modalOverlay').classList.contains('show')) {
                openModal(deviceId);
            }
        }

        function setFridgeModeAndSend(deviceId, mode) {
                const allDevs = getAllDevicesList();
                const device = allDevs.find(d => d.id === deviceId);
                if (!device) return;

                for (const room in allDevices) {
                    const idx = allDevices[room].findIndex(d => d.id === deviceId);
                    if (idx !== -1) {
                        allDevices[room][idx].mode = mode;

                        // ===== 根据模式自动调整温度 =====
                        if (mode === '智能') {
                            allDevices[room][idx].temperature = 4;
                            allDevices[room][idx].freezerTemp = -18;
                        } else if (mode === '速冻') {
                            allDevices[room][idx].temperature = 2;
                            allDevices[room][idx].freezerTemp = -25;
                        } else if (mode === '假日') {
                            allDevices[room][idx].temperature = 6;
                            allDevices[room][idx].freezerTemp = -15;
                        }

                        addLog(`🧊 ${device.name} 模式 → ${mode}（冷藏${allDevices[room][idx].temperature}°C，冷冻${allDevices[room][idx].freezerTemp}°C）`);
                        sendToBackend(deviceId, 'set_fridge_mode', mode);
                        saveToStorage();
                        break;
                    }
                }
                renderUI();
                renderScene();
                if (document.getElementById('modalOverlay').classList.contains('show')) {
                    openModal(deviceId);
                }
            }

        function setStovePowerAndSend(deviceId, power) {
            const allDevs = getAllDevicesList();
            const device = allDevs.find(d => d.id === deviceId);
            if (!device) return;

            for (const room in allDevices) {
                const idx = allDevices[room].findIndex(d => d.id === deviceId);
                if (idx !== -1) {
                    allDevices[room][idx].powerLevel = power;
                    allDevices[room][idx].power = power > 0 ? 'on' : 'off';
                    const powerText = power === 0 ? '关闭' : `${power}%`;
                    addLog(`🍳 ${device.name} 火力 → ${powerText}`);
                    sendToBackend(deviceId, 'set_power', power);
                    saveToStorage();
                    break;
                }
            }
            renderUI();
            renderScene();
            if (document.getElementById('modalOverlay').classList.contains('show')) {
                openModal(deviceId);
            }
        }

        function controlLockAndSend(deviceId, action) {
            const allDevs = getAllDevicesList();
            const device = allDevs.find(d => d.id === deviceId);
            if (!device) return;

            for (const room in allDevices) {
                const idx = allDevices[room].findIndex(d => d.id === deviceId);
                if (idx !== -1) {
                    if (action === 'unlock') {
                        allDevices[room][idx].power = 'unlocked';
                        addLog(`🔓 ${device.name} 已开锁`);
                        sendToBackend(deviceId, 'lock_unlock', 1);
                    } else if (action === 'lock') {
                        allDevices[room][idx].power = 'locked';
                        addLog(`🔒 ${device.name} 已上锁`);
                        sendToBackend(deviceId, 'lock_unlock', 0);
                    }
                    saveToStorage();
                    break;
                }
            }
            renderUI();
            renderScene();
            if (document.getElementById('modalOverlay').classList.contains('show')) {
                openModal(deviceId);
            }
        }

        // 安防模式 - 只切换模式，不影响开关
            function controlAlarmMode(deviceId, mode) {
                const allDevs = getAllDevicesList();
                const device = allDevs.find(d => d.id === deviceId);
                if (!device) return;

                const modeMap = { 'disarmed': '撤防（在家模式）', 'armed': '布防（离家模式）', 'alarming': '报警中！' };

                for (const room in allDevices) {
                    const idx = allDevices[room].findIndex(d => d.id === deviceId);
                    if (idx !== -1) {
                        // 只改模式，不影响开关状态
                        allDevices[room][idx].power = mode;
                        addLog(`🔔 ${device.name} → ${modeMap[mode]}`);
                        const value = mode === 'disarmed' ? 0 : (mode === 'armed' ? 1 : 2);
                        sendToBackend(deviceId, 'alarm_switch', value);
                        saveToStorage();
                        break;
                    }
                }
                renderUI();
                renderScene();
                if (document.getElementById('modalOverlay').classList.contains('show')) {
                    openModal(deviceId);
                }
            }

        function controlRackAndSend(deviceId, action) {
            const allDevs = getAllDevicesList();
            const device = allDevs.find(d => d.id === deviceId);
            if (!device) return;

            for (const room in allDevices) {
                const idx = allDevices[room].findIndex(d => d.id === deviceId);
                if (idx !== -1) {
                    const currentPos = allDevices[room][idx].position || 50;
                    if (action === 'up') {
                        const newPos = Math.max(0, currentPos - 10);
                        allDevices[room][idx].position = newPos;
                        allDevices[room][idx].isMoving = newPos > 0;
                        addLog(`👕 ${device.name} 上升中... ${newPos}%`);
                        sendToBackend(deviceId, 'set_rack_position', newPos);
                    } else if (action === 'down') {
                        const newPos = Math.min(100, currentPos + 10);
                        allDevices[room][idx].position = newPos;
                        allDevices[room][idx].isMoving = newPos < 100;
                        addLog(`👕 ${device.name} 下降中... ${newPos}%`);
                        sendToBackend(deviceId, 'set_rack_position', newPos);
                    } else if (action === 'stop') {
                        allDevices[room][idx].isMoving = false;
                        addLog(`👕 ${device.name} 已停止`);
                    }
                    saveToStorage();
                    break;
                }
            }
            renderUI();
            renderScene();
            if (document.getElementById('modalOverlay').classList.contains('show')) {
                openModal(deviceId);
            }
        }

        function controlRackLightAndSend(deviceId, isOn) {
            const allDevs = getAllDevicesList();
            const device = allDevs.find(d => d.id === deviceId);
            if (!device) return;

            for (const room in allDevices) {
                const idx = allDevices[room].findIndex(d => d.id === deviceId);
                if (idx !== -1) {
                    allDevices[room][idx].light = isOn;
                    addLog(`👕 ${device.name} 照明 ${isOn ? '已开启' : '已关闭'}`);
                    sendToBackend(deviceId, 'set_rack_light', isOn ? 1 : 0);
                    saveToStorage();
                    break;
                }
            }
            renderUI();
            renderScene();
            if (document.getElementById('modalOverlay').classList.contains('show')) {
                openModal(deviceId);
            }
        }

        function updateLightPreview(value) {
            const allDevs = getAllDevicesList();
            const device = allDevs.find(d => d.id === selectedDeviceId);
            if (!device) return;

            const isLight = ['living_light1', 'living_light2', 'bedroom_light', 'entrance_light', 'balcony_light'].includes(
                device.id);
            if (!isLight) return;

            const brightness = parseInt(value);
            for (const room in allDevices) {
                const idx = allDevices[room].findIndex(d => d.id === device.id);
                if (idx !== -1) {
                    allDevices[room][idx].brightness = brightness;
                    allDevices[room][idx].power = brightness > 0 ? 'on' : 'off';
                    allDevices[room][idx].pending = false;
                    break;
                }
            }
            renderUI();
            renderScene();
        }

        // ================================================================
        //  🚀 页面启动 - 强制从后端加载数据
        // ================================================================

        console.log('🏠 设备控制页面启动...');

        // 1. 显示加载状态
        document.getElementById('totalStatus').textContent = '⏳ 加载中...';
        document.getElementById('deviceScroll').innerHTML =
            '<p style="color:#C4B5A5;padding:20px;text-align:center;">⏳ 加载设备状态...</p>';

        // 2. 从后端拉取数据（强制覆盖 localStorage）
        refreshDeviceStatus();

        // 2.5 立即渲染场景图
            renderScene();

        // 3. 启动自动轮询（每5秒）
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
        }
        autoRefreshInterval = setInterval(refreshDeviceStatus, 10000);

        // 4. 注册弹窗关闭事件
        document.getElementById('modalOverlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        addLog('🏠 设备控制已加载');
        console.log('✅ 设备控制页面已启动，自动轮询已开启（5秒）');
        console.log('💡 提示：如果没有设备在线，请先启动 device_simulator.py');
    </script>
</body>
